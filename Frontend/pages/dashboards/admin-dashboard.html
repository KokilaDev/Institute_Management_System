<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<section id="dashboard" class="page">
    <div class="glass-card">
        <h1>Dashboard</h1>
    </div>

    <div class="grid cards">
        <div id="totalStudents" class="card stat" style="grid-column: span 3;">
            <div>
                <div class="muted">Total Students</div>
                <div class="num">—</div>
            </div>
            <div class="pill">Active</div>
        </div>

        <div id="totalLecturers" class="card stat" style="grid-column: span 3;">
            <div>
                <div class="muted">Total Lecturers</div>
                <div class="num">—</div>
            </div>
            <div class="pill">Staff</div>
        </div>

        <div id="totalCourses" class="card stat" style="grid-column: span 3;">
            <div>
                <div class="muted">Total Courses</div>
                <div class="num">—</div>
            </div>
            <div class="pill">Available</div>
        </div>

        <div id="todaysClasses" class="card stat" style="grid-column: span 3;">
            <div>
                <div class="muted">Today's Classes</div>
                <div class="num">—</div>
            </div>
            <div class="pill">Schedule</div>
        </div>

        <div class="card" style="grid-column: span 8; min-height: 300px;">
            <h3>Student Enrollment Chart</h3>
            <div style="height: 240px">
                <canvas id="chartStudents"></canvas>
            </div>
        </div>

        <div class="card" style="grid-column: span 4; min-height: 300px;">
            <h3>Monthly Revenue</h3>
            <div style="max-width: 420px; margin:auto">
                <canvas id="monthlyRevenue"></canvas>
            </div>
        </div>

        <div class="card" style="grid-column: span 8;">
            <h3>Recent Students</h3>
            <table>
                <thead>
                <tr>
                    <th>Student ID</th>
                    <th>Name</th>
                    <th>Course</th>
                    <th>Contact</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody id="studentsTbody"></tbody>
            </table>
        </div>

        <div class="card" style="grid-column: span 4;">
            <h3>Upcoming Exams</h3>
            <ul id="upcomingExams" style="margin: 0 0 0 18px; display:grid; gap:8px;"></ul>
        </div>
    </div>
</section>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script type="module" src="../../js/student.js"></script>

</body>
</html>
