<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/base-styles.css">
    <link rel="stylesheet" href="../../css/main.css">
</head>
<body>

<section id="dashboard" class="page">
    <div class="grid cards">
        <div id="totalStudents" class="card stat" style="grid-column: span 3;">
            <div>
                <div class="muted">Total Students</div>
                <div class="num">—</div>
            </div>
            <div class="pill">Active</div>
        </div>

        <div id="totalLecturers" class="card stat" style="grid-column: span 3;">
            <div>
                <div class="muted">Total Lecturers</div>
                <div class="num">—</div>
            </div>
            <div class="pill">Staff</div>
        </div>

        <div id="totalCourses" class="card stat" style="grid-column: span 3;">
            <div>
                <div class="muted">Total Courses</div>
                <div class="num">—</div>
            </div>
            <div class="pill">Available</div>
        </div>

        <div id="totalEnrollments" class="card stat" style="grid-column: span 3;">
            <div>
                <div class="muted">Total Enrollments</div>
                <div class="num">—</div>
            </div>
            <div class="pill">Available</div>
        </div>

        <div class="card" style="grid-column: span 8; min-height: 300px;">
            <h3>Student Enrollment Chart</h3>
            <div style="height: 240px">
                <canvas id="chartStudents"></canvas>
            </div>
        </div>

        <div class="card" style="grid-column: span 4; min-height: 250px;">
            <h3>Monthly Revenue</h3>
            <div style="max-width: 420px; margin:auto">
                <canvas id="monthlyRevenue"></canvas>
            </div>
        </div>
    </div>
</section>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../../js/dashboard.js"></script>
<script src="../../js/student.js"></script>
<script src="../../js/lecturer.js"></script>
<script src="../../js/course.js"></script>
<script src="../../js/enrollment.js"></script>

</body>
</html>
