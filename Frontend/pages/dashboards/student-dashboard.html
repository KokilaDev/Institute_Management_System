<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/base-styles.css">
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>

<section id="dashboard" class="page">
    <div class="grid cards">
        <div class="card" style="grid-column: span 8; min-height: 300px;">
            <h3>Attendance trends</h3>
            <div style="height: 240px">
                <canvas id="attendanceTrends"></canvas>
            </div>
        </div>

        <div class="card" style="grid-column: span 4; min-height: 300px;">
            <h3>Exam scores</h3>
            <div style="max-width: 420px; margin:auto">
                <canvas id="examScores"></canvas>
            </div>
        </div>

    </div>
</section>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../../js/sdashboard.js"></script>

</body>
</html>
