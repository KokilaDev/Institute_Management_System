<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>

<section id="enrollment" class="page">
    <div class="glass-card">
        <h1>Enrollment</h1>
    </div>

    <div class="grid cards">
        <form class="card" style="grid-column: span 12; min-height: 300px;">
            <div class="form-label"></div>
            <div class="form-label">
                Date : <span id="enrollDate"></span>
            </div>

            <div>
                <label for="studentId" class="form-label">Student ID</label>
                <input type="text" name="studentId" id="studentId" class="form-control">
            </div>
            <div>
                <label for="name" class="form-label">Student Name</label>
                <input type="text" name="name" id="name" class="form-control" readonly>
            </div>
            <div>
                <label for="courseName" class="form-label">Course Name</label>
                <input type="text" name="courseName" id="courseName" class="form-control" readonly>
            </div>
            <div>
                <label for="fee" class="form-label">Course Fee</label>
                <input type="text" id="fee" class="form-control" readonly>
            </div>
            <div>
                <label for="paymentType" class="form-label">Payment Type</label>
                <select name="paymentType" id="paymentType" class="form-control">
                    <option value="" disabled selected hidden>Select Payment Type</option>
                    <option value="full-cash">Full - Cash</option>
                    <option value="full-card">Full - Card</option>
                    <option value="installment">Installment</option>
                    <option value="advance">Advance</option>
                    <option value="bank">Bank Transfer</option>
                </select>
            </div>
            <div>
                <label for="discount" class="form-label">Discount</label>
                <input type="text" id="discount" class="form-control" readonly>
            </div>
            <div>
                <label for="total" class="form-label">Total Amount</label>
                <input type="text" id="total" class="form-control" readonly>
            </div>

            <div class="buttons">
                <button type="button" class="btn btn-primary" id="enroll_btn">
                    <i class="fa-solid fa-book-open"></i> Enroll
                </button>
                <button type="reset" class="btn btn-success" id="cancel_btn">
                    <i class="fa-solid fa-xmark"></i> Cancel
                </button>
            </div>

        </form>

    </div>
</section>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script type="module" src="../../js/enrollment.js"></script>
<script src="../../js/validation.js"></script>

</body>
</html>
