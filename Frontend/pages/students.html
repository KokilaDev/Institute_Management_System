<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Students</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<section id="students" class="page">
    <div class="glass-card">
        <h1>Students</h1>
    </div>

    <div class="grid cards">
        <form class="card" style="grid-column: span 12; min-height: 300px;">
            <div class="form-label id">
                Student ID : <span id="studentId"></span>
            </div>
            <div class="form-label">
                Date : <span id="registerDate"></span>
            </div>
            <div>
                <label for="name" class="form-label">Full Name</label>
                <input type="text" name="name" id="name" class="form-control">
            </div>
            <div>
                <label for="address" class="form-label">Address</label>
                <input type="text" name="address" id="address" class="form-control">
            </div>
            <div>
                <label for="contact" class="form-label">Contact No</label>
                <input type="text" name="contact" id="contact" class="form-control">
            </div>
            <div>
                <label for="email" class="form-label">Email</label>
                <input type="text" name="email" id="email" class="form-control">
            </div>

            <div class="buttons">
                <button type="button" class="btn btn-success" id="stu_save_btn">
                    <i class="fa fa-save"></i> Save
                </button>
                <button type="button" class="btn btn-primary" id="stu_update_btn">
                    <i class="fa fa-edit"></i> Update
                </button>
                <button type="button" class="btn btn-danger" id="stu_delete_btn">
                    <i class="fa fa-trash"></i> Delete
                </button>
                <button type="reset" class="btn btn-warning" id="stu_reset_btn">
                    <i class="fa fa-refresh"></i> Reset
                </button>
            </div>
        </form>

        <div class="card" style="grid-column: span 12;">
            <table>
                <thead>
                <tr>
                    <th>Student ID</th>
                    <th>Name</th>
                    <th>Address</th>
                    <th>Contact No</th>
                    <th>Email</th>
                    <th>Register Date</th>
                </tr>
                </thead>
                <tbody id="student_table_body"></tbody>
            </table>
        </div>
    </div>
</section>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script type="module" src="../../js/student.js"></script>
<script src="../../js/validation.js"></script>

</body>
</html>
