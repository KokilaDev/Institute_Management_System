<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>

<section id="payment" class="page">
    <div class="glass-card">
        <h1>Payment</h1>
    </div>

    <div class="grid cards">
        <form class="card" style="grid-column: span 12; min-height: 300px;">
            <div class="form-label"></div>
            <div class="form-label">
                Date : <span id="paymentDate"></span>
            </div>
            <div>
                <label class="form-label">Student ID</label>
                <input type="text" id="studentId" class="form-control" readonly>
            </div>
            <div>
                <label class="form-label">Student Name</label>
                <input type="text" id="studentName" class="form-control" readonly>
            </div>
            <div>
                <label class="form-label">Course Name</label>
                <input type="text" id="courseName" class="form-control" readonly>
            </div>
            <div>
                <label class="form-label">Course Fee</label>
                <input type="text" id="fee" class="form-control" readonly>
            </div>
            <div class="form-row">
                <div>
                    <label class="form-label">Payment Type</label>
                    <select id="paymentType" class="form-control">
                        <option value="" disabled selected hidden>Select Payment Type</option>
                        <option value="cash">Cash</option>
                        <option value="card">Card</option>
                        <option value="online">Online</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">Discount</label>
                    <input type="number" id="discount" class="form-control" value="0" readonly>
                </div>
                <div>
                    <label class="form-label">Total</label>
                    <input type="text" id="total" class="form-control" readonly>
                </div>
            </div>

            <div class="buttons">
                <button type="button" class="btn btn-success" id="pay_btn">
                    <i class="fa-solid fa-credit-card"></i> Pay
                </button>
                <button type="button" class="btn btn-primary" id="print_receipt_btn">
                    <i class="fa-solid fa-file-invoice"></i> Print Receipt
                </button>
            </div>

        </form>
    </div>
</section>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script type="module" src="../../js/payment.js"></script>
<script src="../../js/validation.js"></script>

</body>
</html>
