<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<section id="courses" class="page">
    <div class="glass-card">
        <h1>Courses Management</h1>
    </div>
    <div class="grid cards">
        <form id="courseForm" class="card" style="grid-column: span 12;">
            <div>
                <label for="name" class="form-label">Course Name</label>
                <input type="text" id="name" class="form-control" required>
            </div>
            <div>
                <label for="duration" class="form-label">Duration</label>
                <input type="text" id="duration" class="form-control" placeholder="e.g. 3 Months">
            </div>
            <div>
                <label for="course_fee" class="form-label">Fee</label>
                <input type="text" id="course_fee" class="form-control">
            </div>
            <div>
                <label for="lecturer" class="form-label">Lecturer</label>
                <select id="lecturer" class="form-control" required>
                    <option value="" disabled selected hidden>Select Lecturer</option>
                </select>
            </div>
            <div>
                <label for="start_date" class="form-label">Start Date</label>
                <input type="date" id="start_date" class="form-control">
            </div>
            <div>
                <label for="end_date" class="form-label">End Date</label>
                <input type="date" id="end_date" class="form-control">
            </div>

            <div class="buttons">
                <button type="button" class="btn btn-success" id="cou_save_btn">
                    <i class="fa fa-save"></i> Save
                </button>
                <button type="button" class="btn btn-primary" id="cou_update_btn">
                    <i class="fa fa-edit"></i> Update
                </button>
                <button type="button" class="btn btn-danger" id="cou_delete_btn">
                    <i class="fa fa-trash"></i> Delete
                </button>
                <button type="reset" class="btn btn-warning" id="cou_reset_btn">
                    <i class="fa fa-refresh"></i> Reset
                </button>
            </div>
        </form>

        <div class="card" style="grid-column: span 12;">
            <table>
                <thead>
                <tr>
                    <th>Course ID</th>
                    <th>Course Name</th>
                    <th>Duration</th>
                    <th>Fee</th>
                    <th>Lecturer</th>
                    <th>Start Date</th>
                    <th>End Date</th>
                </tr>
                </thead>
                <tbody id="course_table_body"></tbody>
            </table>
        </div>
    </div>
</section>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script type="module" src="../../js/course.js"></script>
<script src="../../js/validation.js"></script>

</body>
</html>
